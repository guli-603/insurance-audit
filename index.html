<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投保数据处理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .title { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }
        .status { font-size: 14px; color: #666; margin-bottom: 24px; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e8e8e8;
            border-top-color: #1677ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ff4d4f; font-size: 14px; display: none; }
        .retry-btn {
            display: none;
            margin-top: 16px;
            padding: 8px 24px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .retry-btn:hover { background: #4096ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">投保数据处理系统</div>
        <div class="spinner" id="spinner"></div>
        <div class="status" id="status">正在连接服务器...</div>
        <div class="error" id="error"></div>
        <button class="retry-btn" id="retryBtn" onclick="loadUrl()">重试</button>
    </div>

    <script>
    // ===== 配置 =====
    // 替换为你的 Gist ID（创建 Gist 后填入）
    var GIST_ID = "7ca1af11b68ece8a1ba8b310360ac752";
    // Gist 中存储 URL 的文件名
    var GIST_FILENAME = "tunnel_url.txt";
    // =================

    function loadUrl() {
        var spinner = document.getElementById("spinner");
        var status = document.getElementById("status");
        var error = document.getElementById("error");
        var retryBtn = document.getElementById("retryBtn");

        spinner.style.display = "block";
        status.textContent = "正在获取服务器地址...";
        error.style.display = "none";
        retryBtn.style.display = "none";

        var url = "https://gist.githubusercontent.com/raw/" + GIST_ID + "/" + GIST_FILENAME + "?t=" + Date.now();

        fetch(url)
            .then(function(res) {
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.text();
            })
            .then(function(tunnelUrl) {
                tunnelUrl = tunnelUrl.trim();
                if (!tunnelUrl || !tunnelUrl.startsWith("http")) {
                    throw new Error("无效的服务器地址");
                }
                status.textContent = "连接成功，正在跳转...";
                setTimeout(function() {
                    window.location.href = tunnelUrl;
                }, 500);
            })
            .catch(function(err) {
                spinner.style.display = "none";
                status.textContent = "";
                error.style.display = "block";
                error.textContent = "无法连接服务器：" + err.message + "。服务可能未启动。";
                retryBtn.style.display = "inline-block";
            });
    }

    // 页面加载后自动开始
    loadUrl();
    </script>
</body>
</html>
